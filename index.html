<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VGD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
background:#0a0a0a;
color:white;
}

/* HEADER */

header{
padding:20px;
text-align:center;
border-bottom:1px solid #222;
}

.logo{
font-size:24px;
letter-spacing:8px;
}

/* TOP IMAGE SLIDER */

.hero-slider{
position:relative;
width:100%;
height:55vh;
overflow:hidden;
}

.hero-slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s;
}

.hero-slide.active{
opacity:1;
}

/* PRODUCT SECTION */

.product{
max-width:500px;
margin:auto;
padding:30px 20px;
text-align:center;
}

/* PRODUCT IMAGE */

.product img{
width:100%;
margin-bottom:20px;
}

/* FORM */

select,input,button{
width:100%;
padding:14px;
margin-top:10px;
background:#0a0a0a;
border:1px solid #333;
color:white;
font-size:16px;
}

button{
background:white;
color:black;
font-weight:600;
cursor:pointer;
}

footer{
text-align:center;
padding:40px;
color:#777;
}

/* MOBILE */

@media (max-width:600px){

.hero-slider{
height:45vh;
}

}

</style>
</head>

<body>

<header>
<div class="logo">VGD</div>
</header>

<!-- Roterande bilder -->

<section class="hero-slider">

<!-- BYT DESSA TILL DINA BILDER -->

<img src="slide1.jpg" class="hero-slide active">
<img src="slide2.jpg" class="hero-slide">
<img src="slide3.jpg" class="hero-slide">

</section>

<!-- PRODUKT -->

<section class="product">

<!-- PRODUKTBILD -->
<img src="tshirt.jpg">

<h2>VGD T-Shirt</h2>
<p>350 kr</p>

<form action="https://formspree.io/f/yourcode" method="POST">

<input type="hidden" name="Produkt" value="VGD T-Shirt">

<label>Storlek</label>
<select name="Storlek">
<option>S</option>
<option>M</option>
<option>L</option>
</select>

<label>Namn</label>
<input type="text" name="Namn" required>

<label>Email</label>
<input type="email" name="Email" required>

<button type="submit">Förbeställ</button>

</form>

</section>

<footer>
© VGD
</footer>

<script>

/* TOP IMAGE ROTATION */

let heroSlides = document.querySelectorAll(".hero-slide");
let heroIndex = 0;

setInterval(() => {

heroSlides[heroIndex].classList.remove("active");

heroIndex++;

if(heroIndex >= heroSlides.length){
heroIndex = 0;
}

heroSlides[heroIndex].classList.add("active");

}, 3000);

</script>

</body>
</html>
